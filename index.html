<!DOCTYPE html>
<html>
<head>
  <title>Crash Analyzer</title>
</head>

<body style="background:#0b0f1a;color:white;text-align:center;padding-top:100px;">

  <h2>🚀 Crash Analyzer</h2>

  <input id="input" placeholder="1.2, 2.3, 1.8..." style="padding:10px;width:250px;">
  <br><br>

  <button onclick="run()" style="padding:10px 20px;">Analyze</button>

  <h3 id="result"></h3>

  <script>
  async function run() {
    const input = document.getElementById("input").value;
    const data = input.split(",").map(Number);

    try {
      const res = await fetch("https://crash-analyzer-production.up.railway.app/analyze", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
      });

      const result = await res.json();

      document.getElementById("result").innerText = result.result;

    } catch (err) {
      document.getElementById("result").innerText = "Error: " + err;
    }
  }
  </script>

</body>
</html>
