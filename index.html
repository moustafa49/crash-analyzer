<!DOCTYPE html>
<html>
<head>
<title>Crash PRO</title>
</head>

<body style="background:#0b0f1a;color:white;text-align:center">

<h2>🚀 Crash Analyzer PRO</h2>

<input id="input" placeholder="اضف رقم" style="padding:10px">
<button onclick="add()">Add</button>

<div id="history" style="margin:20px;display:flex;flex-wrap:wrap;justify-content:center"></div>

<h3 id="result"></h3>
<h4 id="target"></h4>
<h4 id="confidence"></h4>

<script>
let data = [];

function add(){
  let val = parseFloat(document.getElementById("input").value);
  if(!val) return;

  data.push(val);
  if(data.length > 18) data.shift();

  document.getElementById("input").value = "";

  render();
  run();
}

function render(){
  let box = document.getElementById("history");
  box.innerHTML = "";

  data.forEach(x=>{
    let color = "#3498db";

    if(x>=2 && x<5) color="green";
    if(x>=5 && x<10) color="orange";
    if(x>=10) color="red";

    box.innerHTML += `<div style="
      background:${color};
      margin:5px;
      padding:10px;
      border-radius:8px;
      width:60px">${x}</div>`;
  });
}

async function run(){
  try{
    const res = await fetch("https://crash-analyzer-production.up.railway.app/analyze",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify(data)
    });

    const r = await res.json();

    document.getElementById("result").innerText = r.result;
    document.getElementById("target").innerText = r.target;
    document.getElementById("confidence").innerText = r.confidence;

  }catch(e){
    document.getElementById("result").innerText = "❌ Error";
  }
}
</script>

</body>
</html>
