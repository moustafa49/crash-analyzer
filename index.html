<!DOCTYPE html>
<html>
<head>
  <title>🚀 Crash Analyzer PRO</title>
  <style>
    body {
      background: #0b0f1a;
      color: white;
      text-align: center;
      font-family: Arial;
    }

    h1 {
      margin-top: 20px;
    }

    input {
      padding: 10px;
      width: 200px;
      font-size: 16px;
    }

    button {
      padding: 10px 15px;
      margin: 5px;
      font-size: 16px;
      cursor: pointer;
    }

    .box {
      display: inline-block;
      padding: 10px;
      margin: 5px;
      border-radius: 10px;
      min-width: 60px;
      font-weight: bold;
    }

    .low { background: #3498db; }
    .mid { background: #2ecc71; }
    .high { background: #e67e22; }
    .mega { background: red; }

    .result-box {
      margin-top: 20px;
      font-size: 20px;
    }
  </style>
</head>

<body>

<h1>🚀 Crash Analyzer PRO</h1>

<input id="input" placeholder="ادخل رقم">
<button onclick="add()">Add</button>
<button onclick="analyze()">Analyze</button>

<div id="history"></div>

<div class="result-box">
  <div id="result"></div>
  <div id="target"></div>
  <div id="confidence"></div>
</div>

<script>
let data = [];

function getClass(x){
  if(x < 2) return "low";
  if(x < 5) return "mid";
  if(x < 10) return "high";
  return "mega";
}

function add(){
  let val = parseFloat(document.getElementById("input").value);
  if(!val) return;

  data.push(val);

  let div = document.createElement("div");
  div.className = "box " + getClass(val);
  div.innerText = val;

  document.getElementById("history").prepend(div);

  document.getElementById("input").value = "";
}

async function analyze(){
  document.getElementById("result").innerText = "⏳ جاري التحليل...";

  try{
    const res = await fetch("https://crash-analyzer-production.up.railway.app/analyze", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(data)
    });

    const r = await res.json();

    document.getElementById("result").innerText = r.result;
    document.getElementById("target").innerText = "🎯 " + r.target;
    document.getElementById("confidence").innerText = "📊 " + r.confidence;

  } catch(e){
    document.getElementById("result").innerText = "❌ Error: " + e;
  }
}
</script>

</body>
</html>
