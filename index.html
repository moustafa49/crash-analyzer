<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>Crash Analyzer PRO</title>

  <style>
    body {
      background: #0b1320;
      color: white;
      text-align: center;
      font-family: Arial;
    }

    h1 {
      margin-top: 20px;
    }

    input {
      padding: 10px;
      width: 200px;
      border-radius: 5px;
      border: none;
    }

    button {
      padding: 10px;
      margin: 5px;
      cursor: pointer;
      border-radius: 5px;
      border: none;
    }

    #numbers {
      margin-top: 20px;
    }

    .box {
      display: inline-block;
      padding: 10px;
      margin: 5px;
      border-radius: 10px;
      color: white;
      font-weight: bold;
    }

    #result {
      margin-top: 30px;
      font-size: 24px;
    }

    #target {
      font-size: 20px;
      color: violet;
    }

    #confidence {
      font-size: 18px;
      color: lightgreen;
    }
  </style>
</head>

<body>

  <h1>🚀 Crash Analyzer PRO</h1>

  <input id="input" placeholder="ادخل رقم">
  <button onclick="addNumber()">Add</button>
  <button onclick="analyze()">Analyze</button>

  <div id="numbers"></div>

  <h2 id="result"></h2>
  <h3 id="target"></h3>
  <h4 id="confidence"></h4>

<script>

let numbers = [];

function addNumber() {
  const input = document.getElementById("input");
  const val = parseFloat(input.value);

  if (!val) return;

  numbers.push(val);

  if (numbers.length > 18) numbers.shift();

  renderNumbers();
  input.value = "";
}

function renderNumbers() {
  const container = document.getElementById("numbers");
  container.innerHTML = "";

  numbers.forEach(n => {
    let color = "#1f6feb";

    if (n >= 2 && n < 5) color = "green";
    if (n >= 5) color = "orange";
    if (n > 10) color = "red";

    container.innerHTML += `<div class="box" style="background:${color}">${n}</div>`;
  });
}

function analyze() {
  if (numbers.length < 5) {
    document.getElementById("result").innerText = "❗ محتاج داتا أكتر";
    return;
  }

  const last = numbers.slice(-10);
  const avg = last.reduce((a, b) => a + b, 0) / last.length;

  let result = "";
  let target = "";
  let confidence = Math.min(95, Math.round(avg * 15));

  if (avg < 2) {
    result = "📉 ضعيف";
    target = "1x → 2x";
  } else if (avg < 5) {
    result = "⚖️ متوسط";
    target = "2x → 5x";
  } else {
    result = "🔥 دخول قوي";
    target = "5x → 7x";
  }

  document.getElementById("result").innerText = result;
  document.getElementById("target").innerText = target;
  document.getElementById("confidence").innerText = confidence + "%";
}

</script>

</body>
</html>
