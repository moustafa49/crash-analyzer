<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Crash Analyzer PRO</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b1b2b;
  color: #fff;
  text-align: center;
}

.container {
  padding: 20px;
}

h1 {
  margin-top: 20px;
}

input {
  width: 60%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin-right: 10px;
}

button {
  padding: 12px 18px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  margin: 5px;
  font-weight: bold;
}

.add { background: #3b82f6; color: #fff; }
.analyze { background: #22c55e; color: #fff; }
.clear { background: #ef4444; color: #fff; }

.grid {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  margin-top: 20px;
}

.item {
  margin: 5px;
  padding: 12px 18px;
  border-radius: 10px;
  font-weight: bold;
}

.green { background: #16a34a; }
.blue { background: #2563eb; }
.orange { background: #f59e0b; }
.red { background: #dc2626; }

.result-box {
  margin-top: 30px;
  padding: 20px;
  border-radius: 15px;
  background: #12263a;
}

.stats {
  display: flex;
  justify-content: space-around;
  margin-top: 15px;
}
</style>
</head>

<body>
<div class="container">

<h1>🚀 Crash Analyzer PRO</h1>

<input id="input" type="number" placeholder="أدخل رقم" />
<button class="add" onclick="addNumber()">Add</button>

<br/>

<button class="analyze" onclick="analyze()">Analyze</button>
<button class="clear" onclick="clearData()">Clear</button>

<div class="grid" id="grid"></div>

<div class="result-box">
  <h2 id="result">--</h2>
  <div id="target">--</div>

  <div class="stats">
    <div>📊 المتوسط: <span id="avg">--</span></div>
    <div>📈 أعلى: <span id="max">--</span></div>
    <div>📉 أقل: <span id="min">--</span></div>
  </div>
</div>

</div>

<script>
let data = [];

function addNumber() {
  const input = document.getElementById("input");
  const value = parseFloat(input.value);

  if (!value) return;

  data.push(value);
  input.value = "";
  render();
}

function getColor(num) {
  if (num >= 10) return "red";
  if (num >= 5) return "orange";
  if (num >= 2) return "green";
  return "blue";
}

function render() {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  data.slice(-18).forEach(num => {
    const div = document.createElement("div");
    div.className = "item " + getColor(num);
    div.innerText = num;
    grid.appendChild(div);
  });
}

function clearData() {
  data = [];
  render();
  document.getElementById("result").innerText = "--";
  document.getElementById("target").innerText = "--";
}

async function analyze() {
  try {
    const res = await fetch("/api/analyze", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(data)
    });

    const result = await res.json();

    document.getElementById("result").innerText = result.result;
    document.getElementById("target").innerText = result.target;
    document.getElementById("avg").innerText = result.avg;
    document.getElementById("max").innerText = result.max;
    document.getElementById("min").innerText = result.min;

  } catch (err) {
    document.getElementById("result").innerText = "❌ Error";
  }
}
</script>

</body>
</html>
