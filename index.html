<!DOCTYPE html><html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crash Analyzer PRO</title><style>
body {
  background:#0b1220;
  color:white;
  font-family:Arial;
  text-align:center;
}

h1 {
  margin-top:20px;
}

.input-box {
  margin:20px;
}

input {
  padding:12px;
  width:60%;
  border-radius:10px;
  border:none;
}

button {
  padding:10px 15px;
  border:none;
  border-radius:10px;
  margin:5px;
  font-weight:bold;
}

.add { background:#2563eb; color:white; }
.analyze { background:#16a34a; color:white; }
.clear { background:#dc2626; color:white; }

#numbers {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:10px;
  margin:20px;
}

.box {
  padding:10px 15px;
  border-radius:10px;
  min-width:60px;
}

.result-box {
  background:#111827;
  padding:20px;
  border-radius:15px;
  margin:20px;
}

</style></head><body><h1>🚀 Crash Analyzer PRO</h1><div class="input-box">
  <input id="input" placeholder="أدخل رقم">
  <button class="add" onclick="addNumber()">Add</button>
</div><div>
  <button class="analyze" onclick="analyze()">Analyze</button>
  <button class="clear" onclick="clearAll()">Clear</button>
</div><div id="numbers"></div><div class="result-box">
  <h2 id="result">--</h2>
  <p id="target">--</p>  <div style="display:flex; justify-content:space-around; margin-top:15px;">
    <div>📊 المتوسط<br><span id="avg">--</span></div>
    <div>📈 أعلى رقم<br><span id="max">--</span></div>
    <div>📉 أقل رقم<br><span id="min">--</span></div>
  </div>
</div><script>

let numbers = [];

function addNumber() {
  const input = document.getElementById("input");
  const val = parseFloat(input.value);

  if (!val) return;

  numbers.push(val);
  if (numbers.length > 18) numbers.shift();

  renderNumbers();
  calcStats();

  input.value = "";
}

function renderNumbers() {
  const container = document.getElementById("numbers");
  container.innerHTML = "";

  numbers.forEach(n => {
    let color = "#1f6feb";
    if (n >= 2 && n < 5) color = "green";
    if (n >= 5) color = "orange";
    if (n > 10) color = "red";

    container.innerHTML += `<div class="box" style="background:${color}">${n}</div>`;
  });
}

function calcStats() {
  if (numbers.length === 0) return;

  const avg = (numbers.reduce((a,b)=>a+b,0)/numbers.length).toFixed(2);
  const max = Math.max(...numbers);
  const min = Math.min(...numbers);

  document.getElementById("avg").innerText = avg;
  document.getElementById("max").innerText = max;
  document.getElementById("min").innerText = min;
}

function clearAll() {
  numbers = [];
  renderNumbers();
  document.getElementById("result").innerText = "--";
  document.getElementById("target").innerText = "--";
  document.getElementById("avg").innerText = "--";
  document.getElementById("max").innerText = "--";
  document.getElementById("min").innerText = "--";
}

async function analyze() {
  if (numbers.length < 5) {
    document.getElementById("result").innerText = "❗ محتاج داتا أكتر";
    document.getElementById("target").innerText = "-";
    return;
  }

  try {
    const res = await fetch("/api/analyze", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(numbers)
    });

    const data = await res.json();

    document.getElementById("result").innerText = data.result;
    document.getElementById("target").innerText = data.target;

  } catch (e) {
    document.getElementById("result").innerText = "❌ Error في الاتصال";
    document.getElementById("target").innerText = "--";
  }
}

</script></body>
</html>
