<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crash Analyzer PRO</title>

<style>
body {
  background: #0b1220;
  color: white;
  font-family: Arial;
  text-align: center;
}

h1 {
  margin-top: 20px;
}

input {
  padding: 12px;
  width: 60%;
  border-radius: 8px;
  border: none;
  margin: 10px;
}

button {
  padding: 10px 15px;
  border: none;
  border-radius: 8px;
  margin: 5px;
  cursor: pointer;
  font-weight: bold;
}

.add { background: #1f6feb; color: white; }
.analyze { background: #22c55e; color: white; }
.clear { background: red; color: white; }

#numbers {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  margin-top: 15px;
}

.box {
  padding: 10px;
  margin: 5px;
  border-radius: 8px;
  min-width: 50px;
}

.result-box {
  margin-top: 20px;
  padding: 20px;
  border-radius: 15px;
  background: #111827;
}

.big {
  font-size: 28px;
  font-weight: bold;
  margin: 10px;
}

.target {
  background: #1f2937;
  padding: 10px;
  border-radius: 10px;
  margin-top: 10px;
}

.stats {
  display: flex;
  justify-content: space-around;
  margin-top: 15px;
}

.stat {
  background: #1f2937;
  padding: 10px;
  border-radius: 10px;
  width: 30%;
}
</style>
</head>

<body>

<h1>🚀 Crash Analyzer PRO</h1>

<input id="input" placeholder="أدخل رقم">
<button class="add" onclick="addNumber()">Add</button>
<button class="analyze" onclick="analyze()">Analyze</button>
<button class="clear" onclick="clearAll()">Clear</button>

<div id="numbers"></div>

<div class="result-box">
  <div id="result" class="big">--</div>
  <div id="target" class="target">--</div>

  <div class="stats">
    <div class="stat">
      <div>📊 المتوسط</div>
      <div id="avg">--</div>
    </div>
    <div class="stat">
      <div>📈 أعلى رقم</div>
      <div id="max">--</div>
    </div>
    <div class="stat">
      <div>📉 أقل رقم</div>
      <div id="min">--</div>
    </div>
  </div>
</div>

<script>
let numbers = [];

function addNumber() {
  const input = document.getElementById("input");
  const val = parseFloat(input.value);

  if (!val) return;

  numbers.push(val);

  if (numbers.length > 18) numbers.shift();

  renderNumbers();
  input.value = "";
}

function clearAll() {
  numbers = [];
  renderNumbers();
  document.getElementById("result").innerText = "--";
  document.getElementById("target").innerText = "--";
}

function renderNumbers() {
  const container = document.getElementById("numbers");
  container.innerHTML = "";

  numbers.forEach(n => {
    let color = "#1f6feb";

    if (n >= 2 && n < 5) color = "green";
    if (n >= 5) color = "orange";
    if (n > 10) color = "red";

    container.innerHTML += `<div class="box" style="background:${color}">${n}</div>`;
  });

  if (numbers.length > 0) {
    document.getElementById("avg").innerText =
      (numbers.reduce((a,b)=>a+b,0)/numbers.length).toFixed(2);

    document.getElementById("max").innerText = Math.max(...numbers);
    document.getElementById("min").innerText = Math.min(...numbers);
  }
}

async function analyze() {
  if (numbers.length < 5) {
    document.getElementById("result").innerText = "❗ محتاج داتا أكتر";
    return;
  }

  try {
    const res = await fetch("/api/analyze", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(numbers)
    });

    const data = await res.json();

    document.getElementById("result").innerText = data.result;
    document.getElementById("target").innerText = data.target;

  } catch (err) {
    document.getElementById("result").innerText = "❌ Error في الاتصال";
  }
}
</script>

</body>
</html>
